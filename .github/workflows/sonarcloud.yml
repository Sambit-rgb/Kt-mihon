name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    env:
      SONAR_PROJECT_KEY: Sambit-rgb_Kt-mihon
      SONAR_ORGANIZATION: sambit-rgb

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache SonarCloud
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: Make Gradle Executable
        run: chmod +x gradlew
        continue-on-error: true

      #############################################################
      # Build (don't fail workflow if build fails)
      #############################################################
      - name: Build Project
        run: |
          ./gradlew assembleDebug --stacktrace || true
        continue-on-error: true

      #############################################################
      # Detect SonarQube Gradle Plugin
      #############################################################
      - name: Detect Sonar Plugin
        id: sonarplugin
        run: |
          if grep -R "org.sonarqube" . >/dev/null 2>&1; then
            echo "plugin=true" >> $GITHUB_OUTPUT
          else
            echo "plugin=false" >> $GITHUB_OUTPUT
          fi

      #############################################################
      # Preferred method
      #############################################################
      - name: Run Sonar via Gradle
        if: steps.sonarplugin.outputs.plugin == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew sonar \
            -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
            -Dsonar.organization=${SONAR_ORGANIZATION} \
            --stacktrace || true

      #############################################################
      # Fallback if plugin doesn't exist
      #############################################################
      - name: Run SonarCloud Scanner
        if: steps.sonarplugin.outputs.plugin == 'false'
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.sources=.
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.scm.provider=git
            -Dsonar.java.binaries=.
            -Dsonar.verbose=true
