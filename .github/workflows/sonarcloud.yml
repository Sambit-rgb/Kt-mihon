name: SonarCloud Analysis
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: read
jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    env:
      SONAR_PROJECT_KEY: Sambit-rgb_Kt-mihon
      SONAR_ORGANIZATION: sambit-rgb
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dkotlin.compiler.execution.strategy=in-process"
      JAVA_TOOL_OPTIONS: "-Xmx6g"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free up disk and memory
        run: |
          sudo swapoff -a
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Project
        run: ./gradlew build -x test --stacktrace --no-daemon --max-workers=2

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_SCANNER_OPTS: "-Xmx6g"
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=Sambit-rgb_Kt-mihon
            -Dsonar.organization=sambit-rgb
            -Dsonar.sources=.
            -Dsonar.exclusions=**/build/**,**/*.min.js,**/resources/**,**/*.xml
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.scm.provider=git
            -Dsonar.java.binaries=**/build/classes/**
            -Dsonar.kotlin.source.version=1.9
            -Dsonar.verbose=true
