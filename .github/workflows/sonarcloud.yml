name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    env:
      SONAR_PROJECT_KEY: Sambit-rgb_Kt-mihon
      SONAR_ORGANIZATION: sambit-rgb

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Project
        run: ./gradlew build -x test --stacktrace

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=Sambit-rgb_Kt-mihon
            -Dsonar.organization=sambit-rgb
            -Dsonar.sources=.
            -Dsonar.exclusions=**/build/**,**/*.min.js,**/resources/**,**/*.xml
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.scm.provider=git
            -Dsonar.java.binaries=**/build/classes/**
            -Dsonar.kotlin.source.version=1.9
            -Dsonar.verbose=true
